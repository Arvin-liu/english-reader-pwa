<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07090d" />
    <title>英语阅读器</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css?v=6" />
  </head>
  <body class="dark">
    <main class="app" aria-label="英语点击发音阅读器">
      <section id="pasteView" class="paste-view">
        <textarea id="textInput" class="paste-box" placeholder="粘贴英文内容..." autocomplete="off" autocapitalize="off" spellcheck="false"></textarea>
      </section>
      <section id="reader" class="reader" aria-live="polite"></section>
      <button id="settingsToggle" class="settings-toggle" type="button" aria-label="设置">☰</button>
      <aside id="settingsPanel" class="settings-panel" aria-hidden="true">
        <div class="settings-card">
          <div class="settings-head"><strong>设置</strong><button id="closeSettings" type="button" class="ghost">关闭</button></div>
          <label>语速 <input id="rate" type="range" min="0.6" max="1.5" step="0.1" /> <span id="rateValue"></span></label>
          <label>字号 <input id="fontSize" type="range" min="18" max="34" step="1" /> <span id="fontValue"></span></label>
          <label>主题 <button id="themeToggle" type="button">切换浅色</button></label>
          <label>发音模式
            <select id="ttsMode">
              <option value="external">高拟真 TTS 优先</option>
              <option value="browser">浏览器 TTS</option>
            </select>
          </label>
          <label>TTS 代理接口地址 <input id="ttsProxyUrl" type="url" placeholder="https://your-worker.example.workers.dev/tts" /></label>
          <button id="saveTtsProxy" type="button">保存代理地址</button>
          <button id="testTtsProxy" type="button">测试代理</button>
          <p class="muted">外部 TTS：<span id="externalTtsStatus">未配置</span></p>
          <p class="muted">已缓存音频数量：<span id="audioCacheCount">0</span></p>
          <button id="clearAudioCache" type="button">清除音频缓存</button>
          <label>当前语音 <span id="voiceName" class="muted">加载中</span></label>
          <label>选择语音 <select id="voiceSelect"></select></label>
          <button id="reloadVoices" type="button">重新加载语音列表</button>
          <button id="previewVoice" type="button">试听当前语音</button>
          <p id="dictStatus" class="muted">本地词典加载中...</p>
          <button id="clearText" type="button" class="danger">清空文本</button>
          <button id="focusPaste" type="button">重新粘贴</button>
          <button id="clearCacheAndReload" type="button">清除缓存并更新应用</button>
          <button id="closeSettingsBottom" type="button" class="ghost">关闭设置</button>
        </div>
      </aside>
      <dialog id="dictDialog"><article class="dict-card"><h2 id="dictWord"></h2><p id="dictPhonetic" class="muted"></p><p id="dictMeaning"></p><div class="dict-actions"><a id="youdaoLink" target="_blank" rel="noopener">去有道查词</a><button id="closeDialog" type="button">关闭</button></div></article></dialog>
    </main>
    <script src="app.js?v=6" defer></script>
  </body>
</html>
